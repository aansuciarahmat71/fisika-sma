<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fisika SMA — Ruang Belajar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>

  <header class="site-header">
    <div class="site-header-inner">
      <a href="#" class="brand">
        <svg class="brand-icon" viewBox="0 0 40 40" aria-hidden="true">
          <circle cx="20" cy="20" r="3" fill="currentColor" />
          <ellipse cx="20" cy="20" rx="17" ry="7" fill="none" stroke="currentColor" stroke-width="1.6" />
          <ellipse cx="20" cy="20" rx="17" ry="7" fill="none" stroke="currentColor" stroke-width="1.6" transform="rotate(60 20 20)" />
          <ellipse cx="20" cy="20" rx="17" ry="7" fill="none" stroke="currentColor" stroke-width="1.6" transform="rotate(120 20 20)" />
        </svg>
        <span class="brand-text">Fisika <em>SMA</em></span>
      </a>
      <div class="header-search">
        <input type="search" id="searchInput" placeholder="Cari materi…" aria-label="Cari materi" />
      </div>
    </div>
  </header>

  <section class="intro-strip">
    <div class="intro-text-wrap">
      <p class="intro-eyebrow">— catatan kelas —</p>
      <p class="intro-eq">F&nbsp;=&nbsp;ma &nbsp;•&nbsp; E&nbsp;=&nbsp;mc² &nbsp;•&nbsp; v&nbsp;=&nbsp;s/t</p>
      <p class="intro-text">Kumpulan materi fisika SMA. Pilih kategori di menu, lalu klik materi yang ingin dipelajari.</p>
    </div>
    <svg class="pendulum-decor" viewBox="0 0 90 130" aria-hidden="true">
      <line class="string" x1="45" y1="6" x2="45" y2="95" />
      <circle class="bob" cx="45" cy="105" r="12" />
    </svg>
  </section>

  <div class="layout">
    <aside class="sidebar" aria-label="Menu kategori">
      <p class="sidebar-label">Kategori</p>
      <nav>
        <ul class="menu-list" id="menuList">
          <li><button class="menu-item active" data-filter="all">Semua Materi</button></li>
          <li><button class="menu-item" data-filter="mekanika">Mekanika</button></li>
          <li><button class="menu-item" data-filter="gelombang">Gelombang &amp; Optik</button></li>
          <li><button class="menu-item" data-filter="listrik-magnet">Listrik &amp; Magnet</button></li>
          <li><button class="menu-item" data-filter="termodinamika">Termodinamika</button></li>
          <li><button class="menu-item" data-filter="fisika-modern">Fisika Modern</button></li>
          <li><button class="menu-item" data-filter="lab-maya">Lab Maya</button></li>         
        </ul>
      </nav>
    </aside>

    <main class="content">
      <div class="content-head">
        <h2 id="contentTitle">Semua Materi</h2>
        <span class="content-count" id="contentCount"></span>
      </div>
      <div class="materi-grid" id="materiGrid"></div>
      <p class="empty-state" id="emptyState" hidden>
        Belum ada materi di kategori ini.
      </p>
    </main>
  </div>

  <footer>
    <p>Selamat belajar fisika 🔭</p>
  </footer>

  <div class="viewer-overlay" id="viewerOverlay">
    <div class="viewer-bar">
      <button class="viewer-back" id="viewerBack">&larr; Kembali ke daftar materi</button>
      <span class="viewer-title" id="viewerTitle"></span>
      <a class="viewer-newtab" id="viewerNewTab" href="#" target="_blank" rel="noopener">Buka di tab baru &#8599;</a>
    </div>
    <iframe class="viewer-frame" id="viewerFrame" title="Materi"></iframe>
  </div>

  <script src="assets/data.js"></script>
  <script src="assets/script.js"></script>
</body>
</html>
